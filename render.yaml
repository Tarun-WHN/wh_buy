services:
  - type: web
    name: now-buy
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm run start
    disk:
      name: now-buy-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: NEXTAUTH_URL
        value: https://now-buy.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
